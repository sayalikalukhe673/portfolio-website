<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You | Sayali Kalukhe</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#0f172a,#1e293b);
        }

        .container{
            background:#fff;
            width:90%;
            max-width:600px;
            padding:40px;
            border-radius:20px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            color:#16a34a;
            margin-bottom:20px;
        }

        p{
            color:#444;
            font-size:18px;
            line-height:1.8;
            margin-bottom:15px;
        }

        .btn{
            display:inline-block;
            margin-top:20px;
            padding:12px 25px;
            background:#2563eb;
            color:white;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
        }

        .btn:hover{
            opacity:0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎉 Thank You!</h1>

        <p>
            Thank you for choosing our service.
        </p>

        <p>

            Your request has been received successfully.
            We appreciate your interest and will get back to you as soon as possible.
        </p>

        <p>
            <strong>Regards,</strong><br>
            Sayali Kalukhe<br>
            Full Stack Java Developer
        </p>

        <a href="index.html" class="btn">Back to Home</a>
    </div>


    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script>
window.onload = function () {

    confetti({
        particleCount: 200,
        spread: 120,
        origin: { y: 0.6 }
    });

    setTimeout(function () {

        confetti({
            particleCount: 150,
            angle: 60,
            spread: 70,
            origin: { x: 0 }
        });

        confetti({
            particleCount: 150,
            angle: 120,
            spread: 70,
            origin: { x: 1 }
        });

    }, 500);

};
</script>
</body>
</html>s
